<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暗房模式切换 UI 方案</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #18181a; color: #ccc; padding: 60px;
  }
  h1 { font-size: 18px; color: #eee; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #777; margin-bottom: 40px; }
  .plans { display: flex; flex-direction: column; gap: 64px; }
  .plan { padding: 40px; border-radius: 2px; }
  .plan-header { margin-bottom: 24px; }
  .plan-name { font-size: 13px; font-weight: 600; color: #aaa; letter-spacing: 0.1em; text-transform: uppercase; }
  .plan-desc { font-size: 12px; color: #666; margin-top: 4px; }
  .mode-bar { display: flex; }

  .plan-original { background: #222; }
  .plan-original .mode-bar { justify-content: center; gap: 8px; flex-wrap: wrap; }
  .plan-original .mode-btn {
    display: flex; align-items: center; gap: 6px; padding: 8px 16px;
    border: 1px solid #444; background: #2a2a2c; border-radius: 20px;
    cursor: pointer; transition: all 0.2s; font-size: 0.85rem; color: #999; font-family: inherit;
  }
  .plan-original .mode-btn:hover { border-color: #777; color: #ddd; background: #333; }
  .plan-original .mode-btn.active { border-color: #c49b6c; background: #c49b6c; color: #fff; }

  .plan-a { background: #1a1a1c; }
  .plan-a .dial-container { display: flex; justify-content: center; }
  .plan-a .dial {
    display: flex; align-items: center; gap: 0;
    background: radial-gradient(ellipse at 50% 40%, #2c2c30, #141416);
    border-radius: 30px; padding: 6px; border: 1px solid #3a3a3e;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .plan-a .mode-btn {
    padding: 10px 20px; border: none; background: transparent; cursor: pointer;
    color: #666; font-size: 11px; letter-spacing: 0.08em; border-radius: 22px;
    transition: all 0.3s; white-space: nowrap; font-weight: 500; font-family: inherit;
  }
  .plan-a .mode-btn .icon { display: block; font-size: 18px; margin-bottom: 4px; }
  .plan-a .mode-btn .label { font-size: 10px; text-transform: uppercase; }
  .plan-a .mode-btn.active {
    background: linear-gradient(180deg, #3a3530, #2a2520);
    color: #d4b896; box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
  }
  .plan-a .mode-btn:not(.active):hover { color: #999; }

  .plan-b { background: #181818; }
  .plan-b .filmstrip { display: flex; justify-content: center; }
  .plan-b .filmstrip-inner {
    display: flex; align-items: stretch; gap: 0; background: #222;
    border-radius: 3px; border: 1px solid #333;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    position: relative; overflow: hidden;
  }
  .plan-b .filmstrip-inner::before, .plan-b .filmstrip-inner::after {
    content: ''; position: absolute; left: 0; right: 0; height: 6px;
    background-image: radial-gradient(circle at 12px center, #000 3px, transparent 3px);
    background-size: 24px 6px;
  }
  .plan-b .filmstrip-inner::before { top: 0; }
  .plan-b .filmstrip-inner::after { bottom: 0; }
  .plan-b .mode-btn {
    padding: 14px 22px; border: none; background: transparent; cursor: pointer;
    color: #555; font-size: 11px; transition: all 0.25s;
    border-right: 1px solid #2a2a2a;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    letter-spacing: 0.05em; font-family: inherit;
  }
  .plan-b .mode-btn:last-child { border-right: none; }
  .plan-b .mode-btn .icon { font-size: 16px; }
  .plan-b .mode-btn .label { font-size: 9px; text-transform: uppercase; opacity: 0.6; }
  .plan-b .mode-btn.active { background: rgba(196,155,108,0.08); color: #d4b896; }
  .plan-b .mode-btn.active::after {
    content: ''; position: absolute; bottom: 0; left: 10%; right: 10%;
    height: 2px; background: #d4b896;
  }
  .plan-b .mode-btn:not(.active):hover { color: #888; }

  .plan-c { background: #161616; }
  .plan-c .plaque-bar { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
  .plan-c .mode-btn {
    padding: 14px 28px; border: none; cursor: pointer; background: #1e1e20;
    color: #666; font-size: 11px; letter-spacing: 0.1em; transition: all 0.3s;
    text-transform: uppercase; min-width: 90px; text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    display: flex; flex-direction: column; align-items: center; gap: 6px; font-family: inherit;
  }
  .plan-c .mode-btn::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
  }
  .plan-c .mode-btn .icon { font-size: 16px; }
  .plan-c .mode-btn .label { font-size: 9px; opacity: 0.5; }
  .plan-c .mode-btn.active {
    background: #2a1e14; color: #e8c49a;
    box-shadow: 0 0 20px rgba(196,155,108,0.08), inset 0 0 30px rgba(196,155,108,0.03);
  }
  .plan-c .mode-btn.active::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: #d4b896;
  }
  .plan-c .mode-btn:not(.active):hover { color: #999; background: #252528; }

  .plan-d { background: #1c1c1e; }
  .plan-d .piano-bar { display: flex; justify-content: center; align-items: flex-end; gap: 2px; }
  .plan-d .mode-btn {
    padding: 16px 22px 12px; border: none; cursor: pointer;
    background: linear-gradient(180deg, #2a2a2e 0%, #1e1e22 100%);
    color: #777; font-size: 11px; letter-spacing: 0.08em; transition: all 0.15s;
    text-transform: uppercase; border-radius: 3px 3px 0 0;
    border-top: 1px solid #3a3a3e;
    display: flex; flex-direction: column; align-items: center; gap: 4px; font-family: inherit;
  }
  .plan-d .mode-btn .icon { font-size: 15px; }
  .plan-d .mode-btn .label { font-size: 8px; }
  .plan-d .mode-btn.active {
    background: linear-gradient(180deg, #3a3028 0%, #2a221c 100%);
    color: #d4b896; padding-bottom: 16px;
    border-top-color: #c49b6c;
    box-shadow: 0 -2px 8px rgba(196,155,108,0.1);
  }
  .plan-d .mode-btn:not(.active):hover { background: linear-gradient(180deg, #323236 0%, #26262a 100%); color: #999; }

  .c-note { margin-top: 24px; font-size: 11px; color: #555; text-align: center; }
</style>
</head>
<body>
<h1>暗房模式切换 · UI 艺术感方案</h1>
<div class="subtitle">对抗"AI模板感"，融入暗房摄影美学</div>
<div class="plans">
  <div class="plan plan-original">
    <div class="plan-header">
      <div class="plan-name">当前版</div>
      <div class="plan-desc">圆角药丸按钮 + emoji，功能正确但缺少气质</div>
    </div>
    <div class="mode-bar">
      <button class="mode-btn active"><span>🔦</span><span>聚光灯</span></button>
      <button class="mode-btn"><span>🧪</span><span>显影盘</span></button>
      <button class="mode-btn"><span>✨</span><span>光绘</span></button>
      <button class="mode-btn"><span>🔍</span><span>接触印相</span></button>
    </div>
  </div>
  <div class="plan plan-a">
    <div class="plan-header">
      <div class="plan-name">方案 A · 暗房刻度盘</div>
      <div class="plan-desc">相机模式转盘灵感，金属拉丝质感</div>
    </div>
    <div class="dial-container"><div class="dial">
      <button class="mode-btn active"><span class="icon">🔦</span><span class="label">聚光灯</span></button>
      <button class="mode-btn"><span class="icon">🧪</span><span class="label">显影盘</span></button>
      <button class="mode-btn"><span class="icon">✨</span><span class="label">光绘</span></button>
      <button class="mode-btn"><span class="icon">🔍</span><span class="label">接触印相</span></button>
    </div></div>
    <div class="c-note">深色金属旋钮，像 Leica 镜头光圈环</div>
  </div>
  <div class="plan plan-b">
    <div class="plan-header">
      <div class="plan-name">方案 B · 胶片齿孔条</div>
      <div class="plan-desc">整段胶片造型，上下齿孔，每帧一个模式</div>
    </div>
    <div class="filmstrip"><div class="filmstrip-inner">
      <button class="mode-btn active"><span class="icon">🔦</span><span class="label">聚光灯</span></button>
      <button class="mode-btn"><span class="icon">🧪</span><span class="label">显影盘</span></button>
      <button class="mode-btn"><span class="icon">✨</span><span class="label">光绘</span></button>
      <button class="mode-btn"><span class="icon">🔍</span><span class="label">接触印相</span></button>
    </div></div>
    <div class="c-note">齿孔 CSS 径向渐变，active 底部亮线</div>
  </div>
  <div class="plan plan-c">
    <div class="plan-header">
      <div class="plan-name">方案 C · 暗房安全灯铭牌</div>
      <div class="plan-desc">金属蚀刻铭牌，active 像暗房红灯照亮</div>
    </div>
    <div class="plaque-bar">
      <button class="mode-btn active"><span class="icon">🔦</span><span class="label">聚光灯</span></button>
      <button class="mode-btn"><span class="icon">🧪</span><span class="label">显影盘</span></button>
      <button class="mode-btn"><span class="icon">✨</span><span class="label">光绘</span></button>
      <button class="mode-btn"><span class="icon">🔍</span><span class="label">接触印相</span></button>
    </div>
    <div class="c-note">active 暖金光晕，模拟暗房红灯</div>
  </div>
  <div class="plan plan-d">
    <div class="plan-header">
      <div class="plan-name">方案 D · 机械琴键开关</div>
      <div class="plan-desc">录音室琴键开关，机械按压感</div>
    </div>
    <div class="piano-bar">
      <button class="mode-btn active"><span class="icon">🔦</span><span class="label">聚光灯</span></button>
      <button class="mode-btn"><span class="icon">🧪</span><span class="label">显影盘</span></button>
      <button class="mode-btn"><span class="icon">✨</span><span class="label">光绘</span></button>
      <button class="mode-btn"><span class="icon">🔍</span><span class="label">接触印相</span></button>
    </div>
    <div class="c-note">active 底部微量下沉模拟"按下"</div>
  </div>
</div>
</body>
</html>
