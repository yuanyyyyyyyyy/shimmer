<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案C：Canvas 手绘水彩风</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #c8d4ec 0%, #b0c0dc 50%, #a4b4d0 100%);
    font-family: -apple-system, sans-serif;
    gap: 32px;
    padding: 40px;
  }
  h1 { color: #3a5080; font-size: 1.4rem; text-align: center; }
  .badge {
    background: rgba(60,80,120,0.15);
    color: #3a5080;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.7rem;
  }
  .cat-wrap {
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .note {
    color: #6880a8;
    font-size: 0.75rem;
    text-align: center;
    max-width: 340px;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <h1>方案C：Canvas 手绘水彩风</h1>
  <span class="badge">Canvas API · 多层叠加 · 随机抖动</span>

  <div class="cat-wrap">
    <canvas id="catCanvas" width="240" height="300"></canvas>
  </div>

  <p class="note">
    Canvas 绘制，多层半透明形状叠加模拟水彩渗透感，<br>
    每次渲染有微小随机偏移，产生手绘不规则效果。
  </p>

  <script>
    const canvas = document.getElementById('catCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;

    // Utility: add jitter to a value
    function jit(v, amount = 2) {
      return v + (Math.random() - 0.5) * amount;
    }

    // Draw a soft blob shape
    function drawBlob(cx, cy, rx, ry, color, layers = 6, jitter = 3) {
      for (let i = 0; i < layers; i++) {
        const alpha = 0.12 + Math.random() * 0.08;
        const jx = (Math.random() - 0.5) * jitter;
        const jy = (Math.random() - 0.5) * jitter;
        const jrx = rx + (Math.random() - 0.5) * jitter * 0.5;
        const jry = ry + (Math.random() - 0.5) * jitter * 0.5;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = color;
        ctx.beginPath();

        // Draw an organic ellipse with bezier curves
        const points = 8;
        for (let p = 0; p <= points; p++) {
          const angle = (p / points) * Math.PI * 2;
          const nextAngle = ((p + 1) / points) * Math.PI * 2;
          const r = 1;
          const x = cx + jx + Math.cos(angle) * jrx * r;
          const y = cy + jy + Math.sin(angle) * jry * r;

          if (p === 0) {
            ctx.moveTo(x, y);
          } else {
            const cpAngle = angle - (Math.PI / points);
            const cpR = 1.05 + (Math.random() - 0.5) * 0.1;
            const cpx = cx + jx + Math.cos(cpAngle) * jrx * cpR;
            const cpy = cy + jy + Math.sin(cpAngle) * jry * cpR;
            ctx.quadraticCurveTo(cpx, cpy, x, y);
          }
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }

    // Draw a soft triangle (ear)
    function drawEar(x1, y1, x2, y2, x3, y3, color, layers = 5, jitter = 2) {
      for (let i = 0; i < layers; i++) {
        const alpha = 0.1 + Math.random() * 0.1;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(jit(x1, jitter), jit(y1, jitter));
        ctx.lineTo(jit(x2, jitter), jit(y2, jitter));
        ctx.lineTo(jit(x3, jitter), jit(y3, jitter));
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }

    // Draw soft oval (eye)
    function drawEye(cx, cy, rx, ry, color) {
      for (let i = 0; i < 4; i++) {
        const alpha = 0.15 + Math.random() * 0.1;
        const jx = (Math.random() - 0.5) * 1;
        const jy = (Math.random() - 0.5) * 1;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.ellipse(cx + jx, cy + jy, rx + (Math.random()-0.5)*1, ry + (Math.random()-0.5)*1, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // Draw a soft curve (tail)
    function drawTail(points, color, width = 10, layers = 5) {
      for (let i = 0; i < layers; i++) {
        const alpha = 0.08 + Math.random() * 0.06;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = color;
        ctx.lineWidth = width + (Math.random() - 0.5) * 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(jit(points[0][0], 2), jit(points[0][1], 2));
        for (let j = 1; j < points.length; j++) {
          const prev = points[j - 1];
          const curr = points[j];
          const cpx = (prev[0] + curr[0]) / 2 + (Math.random() - 0.5) * 4;
          const cpy = (prev[1] + curr[1]) / 2 + (Math.random() - 0.5) * 4;
          ctx.quadraticCurveTo(jit(cpx, 2), jit(cpy, 2), jit(curr[0], 2), jit(curr[1], 2));
        }
        ctx.stroke();
        ctx.restore();
      }
    }

    // Draw scarf
    function drawScarf(cx, cy, rx, ry, color, layers = 6) {
      // Main scarf band
      drawBlob(cx, cy, rx, ry, color, layers, 2);
      // Scarf tail hanging down
      for (let i = 0; i < layers; i++) {
        const alpha = 0.08 + Math.random() * 0.06;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = color;
        ctx.beginPath();
        const sx = cx - rx * 0.6 + (Math.random()-0.5)*3;
        const sy = cy + ry * 0.3 + (Math.random()-0.5)*2;
        ctx.moveTo(sx, sy);
        ctx.bezierCurveTo(
          sx - 8 + (Math.random()-0.5)*4, sy + 30 + (Math.random()-0.5)*6,
          sx - 4 + (Math.random()-0.5)*4, sy + 55 + (Math.random()-0.5)*6,
          sx + 6 + (Math.random()-0.5)*4, sy + 50 + (Math.random()-0.5)*4
        );
        ctx.bezierCurveTo(
          sx + 10 + (Math.random()-0.5)*4, sy + 40 + (Math.random()-0.5)*4,
          sx + 4 + (Math.random()-0.5)*4, sy + 20 + (Math.random()-0.5)*4,
          sx + 2, sy
        );
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }

    function drawCat() {
      ctx.clearRect(0, 0, W, H);

      const cx = W / 2;
      const bodyY = H * 0.58;
      const headY = H * 0.34;

      // Tail (behind body)
      drawTail([
        [cx + 55, H * 0.78],
        [cx + 85, H * 0.70],
        [cx + 82, H * 0.55],
        [cx + 72, H * 0.50]
      ], '#ede8e0', 12);

      // Body
      drawBlob(cx, bodyY, 52, 58, '#f4f0ea', 8, 3);
      drawBlob(cx, bodyY, 48, 54, '#f8f4ee', 6, 2);

      // Head
      drawBlob(cx, headY, 46, 42, '#f6f2ec', 8, 2);
      drawBlob(cx, headY, 42, 38, '#faf8f4', 5, 1.5);

      // Left ear
      drawEar(cx - 38, headY - 8, cx - 52, headY - 56, cx - 14, headY - 22, '#f0ece6', 6, 2);
      // Right ear
      drawEar(cx + 38, headY - 8, cx + 52, headY - 56, cx + 14, headY - 22, '#f0ece6', 6, 2);

      // Inner left ear
      drawEar(cx - 36, headY - 6, cx - 46, headY - 44, cx - 18, headY - 20, '#c4c0ca', 5, 1.5);
      // Inner right ear
      drawEar(cx + 36, headY - 6, cx + 46, headY - 44, cx + 18, headY - 20, '#c4c0ca', 5, 1.5);

      // Marking near left ear
      drawBlob(cx - 44, headY - 20, 5, 9, '#3a4a5a', 4, 1);

      // Eyes
      drawEye(cx - 18, headY + 2, 5.5, 8, '#2c3a4a');
      drawEye(cx + 18, headY + 2, 5.5, 8, '#2c3a4a');

      // Scarf
      drawScarf(cx, headY + 48, 54, 18, '#7c9ecc', 7);

      // Paws
      drawBlob(cx - 22, H * 0.76, 14, 7, '#e8e2da', 5, 1.5);
      drawBlob(cx + 22, H * 0.76, 14, 7, '#e8e2da', 5, 1.5);
    }

    drawCat();

    // Redraw on click for variation
    canvas.addEventListener('click', drawCat);
  </script>
</body>
</html>
