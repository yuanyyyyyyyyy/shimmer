<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>磨砂玻璃方案对比</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #f2f2f2; padding: 48px; color: #fff;
  }
  h1 { font-size: 16px; margin-bottom: 4px; color: #333; }
  .subtitle { font-size: 12px; color: #888; margin-bottom: 32px; }

  .plans { display: flex; flex-direction: column; gap: 36px; }
  .plan { border-radius: 4px; padding: 0; }
  .plan-header { margin-bottom: 14px; }
  .plan-name { font-size: 12px; font-weight: 600; color: #666; letter-spacing: 0.08em; text-transform: uppercase; }
  .plan-desc { font-size: 11px; color: #999; margin-top: 2px; }

  /* === 模拟 Review hero === */
  .mock {
    position: relative; border-radius: 16px; overflow: hidden;
    min-height: 300px; display: flex; align-items: flex-end;
  }
  .mock .bg {
    position: absolute; inset: 0;
  }
  .mock .inner {
    position: relative; z-index: 2; width: 100%;
    padding: 28px;
  }
  .mock .inner .year { font-size: 0.7rem; letter-spacing: 0.2em; opacity: 0.6; margin-bottom: 4px; }
  .mock .inner .counter { font-size: 2.6rem; font-weight: 800; line-height: 1; display: block; }
  .mock .inner .unit { font-size: 0.9rem; opacity: 0.7; }

  /* === 统计卡片网格 === */
  .stats { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; margin-top: 14px; }
  .sc {
    position: relative; border-radius: 12px; overflow: hidden;
    min-height: 90px; display: flex; align-items: center; justify-content: center;
  }
  .sc .bg { position: absolute; inset: 0; }
  .sc .content { position: relative; z-index: 2; text-align: center; padding: 12px; }
  .sc .content .v { display: block; font-size: 1.2rem; font-weight: 800; }
  .sc .content .l { display: block; font-size: 0.65rem; opacity: 0.65; margin-top: 2px; }
  .sc.main { grid-row: span 2; min-height: 188px; }
  .sc.main .content .v { font-size: 2rem; }

  /* ======== 方案 A ======== */
  .plan-a .mock .bg {
    background: oklch(28% 0.04 250);
  }
  .plan-a .mock .inner {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    margin: 24px;
    padding: 24px;
  }
  .plan-a .sc .bg { background: oklch(28% 0.04 250); }
  .plan-a .sc .content {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.06);
    margin: 8px;
    padding: 12px;
    width: calc(100% - 16px);
  }

  /* ======== 方案 B ======== */
  .plan-b .mock .bg {
    background-image: url(https://picsum.photos/seed/h1/800/500);
    background-size: cover; background-position: center;
    opacity: 0.12;
  }
  .plan-b .mock .bg2 {
    position: absolute; inset: 0;
    background: oklch(28% 0.04 250);
  }
  .plan-b .mock .inner {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    margin: 24px;
    padding: 24px;
  }
  .plan-b .sc-wrap { position: relative; }
  .plan-b .sc .bg { background: oklch(28% 0.04 250); }
  .plan-b .sc .bg2 {
    position: absolute; inset: 0;
    background-image: url(https://picsum.photos/seed/s1/400/300);
    background-size: cover; background-position: center;
    opacity: 0.08;
    mix-blend-mode: screen;
  }
  .plan-b .sc .content {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.06);
    margin: 8px;
    padding: 12px;
    width: calc(100% - 16px);
  }

  /* ======== 方案 C ======== */
  .plan-c .mock .bg {
    background: oklch(25% 0.02 250);
  }
  .plan-c .mock .bg::after {
    content: ''; position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    opacity: 0.15;
    mix-blend-mode: soft-light;
  }
  .plan-c .mock .inner {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.05);
    margin: 24px;
    padding: 24px;
  }
  .plan-c .sc .bg {
    background: oklch(27% 0.02 250);
  }
  .plan-c .sc .content {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.05);
    margin: 8px;
    padding: 12px;
    width: calc(100% - 16px);
  }

  .note { font-size: 10px; color: #999; margin-top: 8px; text-align: center; }
</style>
</head>
<body>
<h1>磨砂玻璃效果 · 方案对比</h1>
<div class="subtitle">三种方案，Hero + 统计卡片完整预览</div>
<div class="plans" id="app"></div>

<script>
const plans = [
  {
    id: 'plan-a',
    name: '方案 A · 纯色底 + 磨砂浮层',
    desc: 'oklch 色块做底，内容区 backdrop-filter blur + 半透白边框',
    note: '底色通过磨砂玻璃透出，干净有层次'
  },
  {
    id: 'plan-b',
    name: '方案 B · 照片淡出 + 磨砂浮层',
    desc: '照片 12% opacity + oklch 混叠，磨砂面板在上',
    note: '隐约有个人照片纹理，不脏不杂'
  },
  {
    id: 'plan-c',
    name: '方案 C · 噪点纹理 + 磨砂浮层',
    desc: '深色底 + CSS feTurbulence 噪点纹理，磨砂覆盖',
    note: '像相纸/胶片颗粒感，文艺氛围最重'
  }
]

const app = document.getElementById('app')
app.innerHTML = plans.map(p => `
  <div class="plan ${p.id}">
    <div class="plan-header">
      <div class="plan-name">${p.name}</div>
      <div class="plan-desc">${p.desc}</div>
    </div>
    <div class="mock">
      <div class="bg"></div>
      <div class="bg2"></div>
      <div class="inner">
        <div class="year">2025 年度报告</div>
        <span class="counter">1,284</span>
        <span class="unit">张照片</span>
      </div>
    </div>
    <div class="stats">
      <div class="sc main">
        <div class="bg"></div>
        <div class="bg2"></div>
        <div class="content"><span class="v">1,284</span><span class="l">全年照片</span></div>
      </div>
      <div class="sc">
        <div class="bg"></div>
        <div class="content"><span class="v">2.3 GB</span><span class="l">存储空间</span></div>
      </div>
      <div class="sc">
        <div class="bg"></div>
        <div class="content"><span class="v">856</span><span class="l">带定位</span></div>
      </div>
      <div class="sc">
        <div class="bg"></div>
        <div class="content"><span class="v">4000×3000</span><span class="l">平均尺寸</span></div>
      </div>
    </div>
    <div class="note">${p.note}</div>
  </div>
`).join('')
</script>
</body>
</html>
